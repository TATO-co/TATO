name: Supabase Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/**"

jobs:
  deploy:
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_REF != '' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: |
          supabase functions deploy \
            create-claim \
            start-ingestion \
            check-live-intake-availability \
            start-live-intake-draft \
            complete-live-intake-draft \
            create-sale-payment \
            complete-claim-payment \
            approve-user \
            set-user-personas \
            suspend-user \
            create-connect-onboarding-link \
            refresh-connect-status \
            gemini-ingest-item \
            stripe-webhook \
            generate-broker-listing
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
